<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — FSMedia</title>
  <link rel="icon" type="image/png" href="../images/favicon1.png" />
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/admin.css" />
</head>
<body class="admin-body">

  <header class="admin-header">
    <a href="index.html" class="admin-logo">FS<span>Media</span> <em>Admin</em></a>
    <div class="admin-header-right">
      <span class="admin-user-email" id="admin-user-email"></span>
      <button class="navbar__theme admin-theme-btn" aria-label="Changer le thème">
        <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
      <button class="admin-btn admin-btn--ghost" id="logout-btn">Se déconnecter</button>
    </div>
  </header>

  <main class="admin-main">
    <div class="admin-toolbar">
      <div>
        <h1 class="admin-page-title">Produits</h1>
        <p class="admin-page-sub" id="products-count"></p>
      </div>
      <button class="admin-btn admin-btn--primary" id="add-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Ajouter un produit
      </button>
    </div>

    <div class="admin-grid" id="admin-grid">
      <div class="admin-loading">
        <div class="admin-spinner"></div>
        Chargement des produits…
      </div>
    </div>
  </main>

  <!-- ===== MODAL PRODUIT ===== -->
  <div class="admin-overlay" id="product-overlay">
    <div class="admin-modal" id="product-modal">
      <div class="admin-modal__header">
        <h2 id="modal-title">Ajouter un produit</h2>
        <button class="admin-modal__close" id="modal-close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <div class="admin-modal__body">
        <form id="product-form" novalidate>
          <input type="hidden" id="f-id" />

          <div class="admin-form-section">
            <h3 class="admin-form-section__title">Informations générales</h3>

            <div class="admin-field admin-field--full">
              <label>Nom du produit *</label>
              <input type="text" id="f-name" placeholder="Gaming entrée de gamme" required />
            </div>

            <div class="admin-field-row">
              <div class="admin-field">
                <label>Catégorie *</label>
                <select id="f-category">
                  <option value="gaming">Gaming</option>
                  <option value="bureautique">Bureautique</option>
                  <option value="creation">Création</option>
                  <option value="reconditionne">Reconditionné</option>
                  <option value="surmesure">Sur mesure</option>
                </select>
              </div>
              <div class="admin-field">
                <label>Libellé catégorie</label>
                <input type="text" id="f-category-label" placeholder="Gaming" />
              </div>
            </div>

            <div class="admin-field-row">
              <div class="admin-field">
                <label>Prix *</label>
                <input type="text" id="f-price" placeholder="600 €" required />
              </div>
              <div class="admin-field">
                <label>Note de prix</label>
                <input type="text" id="f-price-label" placeholder="À partir de" />
              </div>
            </div>

            <div class="admin-field admin-field--full">
              <label>Accroche</label>
              <input type="text" id="f-hint" placeholder="La machine idéale pour jouer en 1080p sans compromis." />
            </div>
          </div>

          <div class="admin-form-section">
            <h3 class="admin-form-section__title">Badge</h3>
            <div class="admin-field-row">
              <div class="admin-field">
                <label>Texte du badge</label>
                <select id="f-badge">
                  <option value="">Aucun</option>
                  <option value="Nouveau">Nouveau</option>
                  <option value="Promo">Promo</option>
                  <option value="Sold">Sold</option>
                  <option value="Reconditionné">Reconditionné</option>
                  <option value="Sur mesure">Sur mesure</option>
                </select>
              </div>
              <div class="admin-field">
                <label>Style du badge</label>
                <select id="f-badge-type">
                  <option value="new">Cyan — Nouveau</option>
                  <option value="promo">Vert — Promo</option>
                  <option value="sold">Rouge — Sold</option>
                  <option value="refurb">Orange — Reconditionné</option>
                </select>
              </div>
            </div>
          </div>

          <div class="admin-form-section">
            <h3 class="admin-form-section__title">Image</h3>
            <div class="admin-field admin-field--full">
              <div class="admin-image-upload" id="image-upload-zone">
                <div class="admin-image-preview" id="image-preview">
                  <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" opacity=".4"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                  <span>Aucune image</span>
                </div>
                <div class="admin-image-controls">
                  <label for="f-image" class="admin-btn admin-btn--ghost admin-btn--sm">Choisir un fichier</label>
                  <input type="file" id="f-image" accept="image/*" style="display:none" />
                  <span class="admin-upload-note">PNG, JPG, WebP — max 5 Mo</span>
                  <button type="button" class="admin-btn admin-btn--ghost admin-btn--sm admin-btn--danger" id="remove-image-btn" style="display:none">Retirer l'image</button>
                </div>
              </div>
            </div>
          </div>

          <div class="admin-form-section">
            <h3 class="admin-form-section__title">Spécifications</h3>
            <div class="admin-field admin-field--full">
              <div id="specs-list"></div>
              <button type="button" class="admin-btn admin-btn--ghost admin-btn--sm" id="add-spec-btn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Ajouter une ligne
              </button>
            </div>
          </div>

          <div class="admin-form-section">
            <h3 class="admin-form-section__title">Options</h3>
            <div class="admin-field-row">
              <div class="admin-field">
                <label>Sujet contact (pré-rempli)</label>
                <input type="text" id="f-contact-subject" placeholder="Gaming entrée de gamme" />
              </div>
              <div class="admin-field">
                <label>Texte du bouton CTA</label>
                <input type="text" id="f-cta-label" placeholder="Commander" value="Commander" />
              </div>
            </div>
            <div class="admin-field-row">
              <div class="admin-field">
                <label>Ordre d'affichage</label>
                <input type="number" id="f-sort-order" value="0" min="0" />
              </div>
              <div class="admin-field"></div>
            </div>
          </div>
        </form>
      </div>

      <div class="admin-modal__footer">
        <span class="admin-save-error" id="save-error"></span>
        <button type="button" class="admin-btn admin-btn--ghost" id="modal-cancel">Annuler</button>
        <button type="button" class="admin-btn admin-btn--primary" id="modal-save">
          <span id="save-label">Sauvegarder</span>
        </button>
      </div>
    </div>
  </div>

  <!-- ===== MODAL CONFIRMATION SUPPRESSION ===== -->
  <div class="admin-overlay" id="confirm-overlay">
    <div class="admin-modal admin-modal--sm">
      <div class="admin-modal__header">
        <h2>Supprimer ce produit ?</h2>
      </div>
      <div class="admin-modal__body">
        <p class="admin-confirm-text">Cette action est <strong>irréversible</strong>. Le produit sera définitivement supprimé du catalogue.</p>
      </div>
      <div class="admin-modal__footer">
        <button type="button" class="admin-btn admin-btn--ghost" id="confirm-cancel">Annuler</button>
        <button type="button" class="admin-btn admin-btn--danger" id="confirm-delete">Supprimer définitivement</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../script/supabase-client.js"></script>
  <script src="../script/global.js"></script>
  <script src="../script/admin.js"></script>
</body>
</html>
